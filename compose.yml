services:
  traefik:
    image: traefik:v2.11
    container_name: receipt-proxy
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--providers.docker.network=receipt"
    ports:
      - "8000:80"
      - "8081:8080" # ダッシュボード (http://localhost:8081)
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - receipt
    restart: always

  db:
    image: mariadb:10.11
    container_name: receipt-db
    restart: always
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - receipt

  server:
    build: ./server
    container_name: receipt-server
    restart: always
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      - db
    networks:
      - receipt
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.server.rule=PathPrefix(`/api`) || PathPrefix(`/auth`) || PathPrefix(`/ping`)"
      - "traefik.http.services.server.loadbalancer.server.port=8080"
      - "traefik.docker.network=receipt"

  client:
    build: ./client
    container_name: receipt-client
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=
    depends_on:
      - server
    networks:
      - receipt
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client.rule=PathPrefix(`/`)"
      - "traefik.http.services.client.loadbalancer.server.port=3000"
      - "traefik.http.routers.client.priority=1"
      - "traefik.docker.network=receipt"

networks:
  receipt:
    driver: bridge

volumes:
  db_data:
