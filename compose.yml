services:
  traefik:
    image: traefik:v2.11
    container_name: receipt-proxy
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8081:8080" # ダッシュボード (http://localhost:8081)
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    restart: always

  db:
    image: mysql:8.0
    container_name: receipt-db
    restart: always
    environment:
      MYSQL_DATABASE: receipt_db
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d

  server:
    build: ./server
    container_name: receipt-server
    restart: always
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=receipt_db
    depends_on:
      - db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.server.rule=PathPrefix(`/api`) || PathPrefix(`/auth`) || PathPrefix(`/ping`)"
      - "traefik.http.services.server.loadbalancer.server.port=8080"

  client:
    build:
      context: ./client
      args:
        - NEXT_PUBLIC_API_URL=
    container_name: receipt-client
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=
    depends_on:
      - server
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client.rule=PathPrefix(`/`)"
      - "traefik.http.services.client.loadbalancer.server.port=3000"
      - "traefik.http.routers.client.priority=1"
