name: CI

on:
  push:
    branches: ["**"]

jobs:
  # ─────────────────────────────────────────
  # Go サーバーの単体テスト
  # ─────────────────────────────────────────
  server-test:
    name: Server (Go) – Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Test
        run: go test ./...
